<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceRock — Stories from the edge of the universe</title>
    <meta
      name="description"
      content="SpaceRock covers AI, physics, space and technology — stories from the edge of the universe."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Funnel+Display:wght@400;500;700;800&family=Atkinson+Hyperlegible+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Instant splash — paints before React loads, fades out after. */
      html { background: #050308; }
      #sr-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #050308;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #sr-splash.sr-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .sr-splash__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }
      .sr-splash__mark {
        font-family: "Syne", system-ui, sans-serif;
        font-weight: 800;
        font-size: clamp(28px, 6vw, 46px);
        letter-spacing: 0.16em;
        background: linear-gradient(180deg, #ffffff 0%, #5500ff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      .sr-splash__bar {
        width: 180px;
        height: 8px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        overflow: hidden;
        box-shadow: 3px 3px 0 #5500ff;
      }
      .sr-splash__fill {
        height: 100%;
        width: 40%;
        background: #5500ff;
        border-radius: 999px;
        animation: sr-slide 1.1s ease-in-out infinite;
      }
      .sr-splash__note {
        font-family: "Atkinson Hyperlegible Mono", ui-monospace, monospace;
        font-size: 12px;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.5);
        text-transform: uppercase;
      }
      @keyframes sr-slide {
        0%   { transform: translateX(-120%); }
        50%  { transform: translateX(60%); }
        100% { transform: translateX(280%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .sr-splash__fill { animation: none; width: 100%; }
        #sr-splash { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Splash shows instantly; main.jsx removes it once the app is ready -->
    <div id="sr-splash">
      <div class="sr-splash__inner">
        <span class="sr-splash__mark">SPACEROCK</span>
        <span class="sr-splash__bar"><span class="sr-splash__fill"></span></span>
        <span class="sr-splash__note">&gt;_ entering orbit</span>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
